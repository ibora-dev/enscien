<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Visualiseur Ultra-Simple : +3 dB = Énergie x2</title>
    <style>
        body { font-family: sans-serif; background: #f0f0f0; color: #333; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .container { background: #fff; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 450px; }
        
        h1 { font-size: 1.2rem; margin-bottom: 5px; color: #555; }
        p.subtitle { font-size: 0.9rem; color: #888; margin-top: 0; margin-bottom: 25px; }

        .viz-area { height: 250px; display: flex; align-items: center; justify-content: center; position: relative; margin-bottom: 20px; overflow: hidden; border-radius: 10px; background: #fafafa; border: 1px solid #eee; }
        
        /* Le cercle qui représente l'énergie physique */
        .sound-circle { width: 40px; height: 40px; background: radial-gradient(circle, #ff6b6b 0%, #ee5253 100%); border-radius: 50%; box-shadow: 0 5px 15px rgba(238, 82, 83, 0.4); transition: width 0.4s ease-out, height 0.4s ease-out; position: absolute; }

        .data-display { display: flex; justify-content: space-around; background: #333; color: #fff; padding: 15px; border-radius: 10px; margin-bottom: 20px; font-weight: bold; }
        .data-box { font-size: 1.1rem; }
        .data-label { display: block; font-size: 0.75rem; color: #aaa; font-weight: normal; text-transform: uppercase; margin-bottom: 3px; }

        .controls { display: flex; gap: 15px; justify-content: center; }
        button { padding: 12px 24px; font-size: 1rem; cursor: pointer; border: none; border-radius: 8px; background: #2e86de; color: white; font-weight: bold; transition: background 0.2s, transform 0.1s; }
        button:hover { background: #1b6ca8; }
        button:active { transform: scale(0.97); }
        button.reset { background: #fff; color: #333; border: 1px solid #ccc; }
        button.reset:hover { background: #eee; }

    </style>
</head>
<body>

<div class="container">
    <h1>🔊 Visualiseur d'Énergie Sonore</h1>
    <p class="subtitle">La taille du cercle montre la puissance réelle du bruit.</p>
    
    <div class="viz-area">
        <div class="sound-circle" id="circle"></div>
    </div>

    <div class="data-display">
        <div class="data-box">
            <span class="data-label">Niveau (Décibels)</span>
            <span id="dbVal">40</span> dB
        </div>
        <div class="data-box">
            <span class="data-label">Puissance Physique</span>
            x <span id="pwrVal">1</span>
        </div>
    </div>

    <div class="controls">
        <button onclick="step(-3)">- 3 dB</button>
        <button onclick="step(3)">+ 3 dB</button>
        <button class="reset" onclick="reset()">RESET</button>
    </div>
</div>

<script>
    // État initial (Doc 4)
    let L = 40;
    let relativePower = 1;
    let baseSize = 40; // Taille initiale du cercle en pixels

    function updateViz() {
        // La règle d'or : +3dB = Puissance physique x 2
        // On augmente le diamètre du cercle proportionnellement à la puissance relative
        let newSize = baseSize * relativePower;
        
        // Limite pour ne pas dépasser l'écran
        newSize = Math.min(newSize, 350);

        const circle = document.getElementById('circle');
        circle.style.width = newSize + "px";
        circle.style.height = newSize + "px";
        
        document.getElementById('dbVal').innerText = L;
        document.getElementById('pwrVal').innerText = relativePower;
    }

    function step(change) {
        L += change;
        if (change > 0) relativePower *= 2; else relativePower /= 2;
        
        // Sécurité pour ne pas descendre trop bas
        if (relativePower < 0.125) { relativePower = 0.125; L = L - change; return; }

        updateViz();
    }

    function reset() {
        L = 40; relativePower = 1;
        updateViz();
    }

    // Initialisation
    updateViz();
</script>

</body>
</html>
