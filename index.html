<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Analyse Acoustique : I, Rapport et dB</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: "Courier New", monospace; background: #fff; color: #000; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 900px; border: 2px solid #000; padding: 25px; }
        h1 { font-size: 1rem; text-decoration: underline; text-align: center; margin-bottom: 30px; letter-spacing: 1px; }
        
        .data-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .data-box { border: 1px solid #000; padding: 12px; text-align: center; }
        .label { font-size: 0.7rem; font-weight: bold; display: block; margin-bottom: 8px; text-transform: uppercase; }
        .value { font-size: 1.4rem; font-weight: bold; }
        
        .chart-container { height: 300px; margin-bottom: 20px; }
        .controls { display: flex; justify-content: center; gap: 15px; border-top: 1px solid #000; padding-top: 20px; }
        
        button { background: #000; color: #fff; border: 1px solid #000; padding: 10px 15px; cursor: pointer; font-family: monospace; font-size: 0.8rem; }
        button:hover { background: #fff; color: #000; }
        .secondary { background: #fff; color: #000; }

        .formula-bar { font-size: 0.75rem; text-align: center; margin-top: 15px; color: #444; }
    </style>
</head>
<body>

<div class="container">
    <h1>UNITÉ DE MESURE : INTENSITÉ ET NIVEAU SONORE (DOC 4)</h1>
    
    <div class="data-grid">
        <div class="data-box">
            <span class="label">Niveau (L)</span>
            <span class="value" id="dbVal">40</span> dB
        </div>
        <div class="data-box">
            <span class="label">Rapport (I/I₀)</span>
            <span class="value" id="ratioVal">10^4</span>
        </div>
        <div class="data-box">
            <span class="label">Intensité (I)</span>
            <span class="value" id="iVal">10^-8</span> W/m²
        </div>
    </div>

    <div class="chart-container">
        <canvas id="mainChart"></canvas>
    </div>

    <div class="controls">
        <button onclick="step(3)">AUGMENTER (+3 dB)</button>
        <button onclick="step(-3)">DIMINUER (-3 dB)</button>
        <button class="secondary" onclick="reset()">RESET</button>
    </div>

    <div class="formula-bar">
        Référence I₀ = 10⁻¹² W/m² | Relation : L = 10 · log(I/I₀)
    </div>
</div>

<script>
    // État initial (Doc 4)
    let L = 40;
    let I = 1e-8;
    const I0 = 1e-12;

    let labels = [40];
    let dataPoints = [1e-8];

    const ctx = document.getElementById('mainChart').getContext('2d');
    const chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                data: dataPoints,
                borderColor: '#000',
                borderWidth: 2,
                pointRadius: 4,
                fill: false,
                tension: 0.1
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
                y: { 
                    title: { display: true, text: 'Intensité I (W/m²)', color: '#000' },
                    ticks: { color: '#000' }
                },
                x: { 
                    title: { display: true, text: 'Niveau sonore (dB)', color: '#000' },
                    ticks: { color: '#000' }
                }
            }
        }
    });

    function step(change) {
        L += change;
        // La règle d'or : +3dB = intensité x 2
        if (change > 0) I *= 2; else I /= 2;

        let ratio = I / I0;

        // Mise à jour affichage
        document.getElementById('dbVal').innerText = L;
        document.getElementById('iVal').innerText = I.toExponential(2);
        document.getElementById('ratioVal').innerText = ratio.toExponential(0).replace('e+', '10^');

        // Mise à jour graphique
        labels.push(L);
        dataPoints.push(I);
        if(labels.length > 10) { labels.shift(); dataPoints.shift(); }
        chart.update();
    }

    function reset() {
        L = 40; I = 1e-8;
        labels.splice(0, labels.length, 40);
        dataPoints.splice(0, dataPoints.length, 1e-8);
        document.getElementById('dbVal').innerText = "40";
        document.getElementById('iVal').innerText = "10^-8";
        document.getElementById('ratioVal').innerText = "10^4";
        chart.update();
    }
</script>

</body>
</html>
